<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pantin Studio</title>
  <style>
    :root{
      --accent:#4a90e2;
      --bg:#0f1720;
      --panel:#0b1220;
      --muted:#9aa6b2;
      --card:#0c1622;
    }
    html,body{height:100%;margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#071428 0%, #0b1b2a 100%);color:#e6eef6}
    .app-shell{display:grid;grid-template-columns:260px 1fr 320px;grid-template-rows:56px 1fr 160px;gap:12px;height:100vh;padding:12px;box-sizing:border-box}
    .toolbar{grid-column:1/-1;background:transparent;display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px}
    .tool-btn{background:var(--card);border:1px solid rgba(255,255,255,0.04);color:var(--accent);padding:8px 12px;border-radius:8px;cursor:pointer}
    .tool-btn.primary{background:var(--accent);color:#fff}
    .panel{background:rgba(255,255,255,0.03);border-radius:10px;padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.6);}
    .left-panel{grid-column:1/2;grid-row:2/3;display:flex;flex-direction:column;gap:8px}
    .center-stage{grid-column:2/3;grid-row:2/3;position:relative;display:flex;align-items:center;justify-content:center}
    .right-panel{grid-column:3/4;grid-row:2/3;display:flex;flex-direction:column;gap:8px}
    .timeline{grid-column:1/-1;grid-row:3/4;display:flex;align-items:flex-end;gap:12px}

    /* Layers list */
    .layers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .layers-list{overflow:auto;max-height:60vh}
    .layer-item{display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:6px;margin-bottom:6px;background:linear-gradient(90deg, rgba(255,255,255,0.02), transparent)}
    .layer-controls{display:flex;gap:6px;align-items:center}

    /* Stage */
    #pantin-container{width:100%;height:100%;border-radius:10px;background:linear-gradient(180deg,#071a2a, #05202f);display:flex;align-items:center;justify-content:center;position:relative}
    #grid-overlay{pointer-events:none;position:absolute;inset:0;background-size:40px 40px;background-image:linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);display:none;border-radius:8px}
    .pantin-wrapper{position:absolute;left:0;top:0;transform-origin:0 0}
    .pantin-object{max-width:640px;max-height:640px;display:block}

    /* Inspector */
    .inspector-row{display:flex;flex-direction:column;margin-bottom:8px}
    label{font-size:12px;color:var(--muted);margin-bottom:6px}
    input[type=text], textarea{width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}

    /* Timeline */
    .timeline-panel{flex:1;background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;display:flex;flex-direction:column}
    .scrubber{width:100%}
    .frame-markers{height:48px;margin-top:10px;display:flex;align-items:center;gap:6px;overflow:auto}
    .frame-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.06)}
    .frame-dot.active{background:var(--accent)}

    /* responsive */
    @media (max-width:900px){.app-shell{grid-template-columns:1fr;grid-template-rows:56px 1fr 260px;}
      .left-panel,.right-panel{display:none}
      .timeline{grid-row:3/4}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="toolbar">
      <button id="new-btn" class="tool-btn">New</button>
      <label class="tool-btn" for="file-input">Import SVG</label>
      <input id="file-input" type="file" accept=".svg" style="display:none" />
      <button id="add-keyframe-btn" class="tool-btn primary">Add Keyframe</button>
      <button id="record-btn" class="tool-btn">Record</button>
      <button id="play-pause-main" class="tool-btn">Play</button>
      <button id="export-btn" class="tool-btn">Export</button>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center"><label style="color:var(--muted);font-size:12px">Speed</label><input id="speed-range" type="range" min="0.5" max="2" step="0.1" value="1" style="width:140px"></div>
    </div>

    <div class="panel left-panel">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Layers</strong>
        <button id="collapse-layers" class="tool-btn">Collapse</button>
      </div>
      <div class="layers-list" id="layers-list"></div>
    </div>

    <div class="panel center-stage">
      <div id="pantin-container">
        <div id="grid-overlay"></div>
      </div>
    </div>

    <div class="panel right-panel">
      <strong>Inspector</strong>
      <div class="inspector-row">
        <label>Selected Element</label>
        <input id="inspector-id" type="text" readonly />
      </div>
      <div class="inspector-row">
        <label>Transform</label>
        <input id="inspector-transform" type="text" />
      </div>
      <div class="inspector-row">
        <label>Actions</label>
        <div style="display:flex;gap:8px"><button id="apply-transform" class="tool-btn">Apply</button><button id="reset-transform" class="tool-btn">Reset</button></div>
      </div>
    </div>

    <div class="timeline" style="grid-column:1/-1">
      <div class="timeline-panel panel">
        <div style="display:flex;align-items:center;gap:12px">
          <strong>Timeline</strong>
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center"><label class="tool-btn" id="add-frame-btn">Add Frame</label><label style="color:var(--muted)">Frames: <span id="frames-count">0</span></label></div>
        </div>
        <input id="scrubber" class="scrubber" type="range" min="0" max="0" value="0">
        <div class="frame-markers" id="frame-markers"></div>
      </div>
    </div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
