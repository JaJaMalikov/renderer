<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pantin Electron</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
    }
    aside {
      width: 230px;
      background: #fafafa;
      padding: 15px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.15);
    }
    #pantin-container {
      position: relative;
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    button, input[type=file] {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
    }
    input[type=range] {
      width: 100%;
      margin-bottom: 10px;
    }
    #grid-overlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px);
      display: none;
    }
  </style>
</head>
<body>
  <aside>
    <input id="file-input" type="file" accept=".svg" />
    <button id="reset-btn">Reset position</button>
    <button id="export-btn">Exporter GIF</button>
    <label for="play-pause">Play/Pause</label>
    <button id="play-pause-btn">Play</button>
    <label for="speed-range">Vitesse</label>
    <input id="speed-range" type="range" min="0.5" max="2" step="0.1" value="1" />
    <label for="zoom-range">Zoom</label>
    <input id="zoom-range" type="range" min="0.5" max="2" step="0.1" value="1" />
    <button id="grid-btn">Grille</button>
    <button id="bg-color-btn">Couleur scène</button>

  </aside>
  <div id="pantin-container">
    <div id="grid-overlay"></div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
